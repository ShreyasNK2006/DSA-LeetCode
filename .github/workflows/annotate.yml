# annotate.yml
# ------------
# Manual-trigger workflow to retroactively add (or refresh) the structured
# comment header on every existing file in problems/.
#
# Useful after you first add a GEMINI_API_KEY so that older solutions also
# get AI-generated explanations.
#
# Run from: Actions tab → "Annotate Existing Solutions" → "Run workflow"

name: Annotate Existing Solutions

on:
  workflow_dispatch:

jobs:
  annotate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-generativeai

      - name: Set Git identity
        run: |
          git config --global user.name  "Shreyas Kamat"
          git config --global user.email "192124395+ShreyasNK2006@users.noreply.github.com"

      - name: Annotate existing solutions
        env:
          LEETCODE_USERNAME: ${{ secrets.LEETCODE_USERNAME }}
          LEETCODE_SESSION:  ${{ secrets.LEETCODE_SESSION }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME:         ${{ secrets.REPO_NAME }}
          COMMIT_NAME:       "Shreyas Kamat"
          COMMIT_EMAIL:      "192124395+ShreyasNK2006@users.noreply.github.com"
        run: |
          python annotate_existing.py

      - name: Push changes to main
        run: |
          git push origin HEAD:main
